# Local Postgres for the e2e tests. Credentials match .env.example, so:
#   pnpm db:up          # start it (waits until healthy)
#   pnpm test:e2e:pg    # start it + run the e2e
#   pnpm db:down        # stop it   (add -v to also drop the data volume)
services:
  postgres:
    image: postgres:16-alpine
    container_name: nest-crud-example-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nest_crud_e2e
    # Host port follows DB_PORT (compose auto-reads .env), so if you already run
    # Postgres on 5432, set DB_PORT=5433 in .env and both this and the tests use it.
    ports:
      - '${DB_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nest_crud_e2e']
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - nest_crud_pgdata:/var/lib/postgresql/data

volumes:
  nest_crud_pgdata:
