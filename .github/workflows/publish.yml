name: Publish Packages (tag)

on:
  push:
    tags:
      - "*.*.*"
      - "*.*.*-beta*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout tag (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "$VERSION" == *"-"* ]]; then
            echo "dist_tag=beta" >> $GITHUB_OUTPUT
          else
            echo "dist_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Ensure tag is from main HEAD
        shell: bash
        run: |
          # Ensure the tag points to a commit that exists on origin/main.
          git fetch --tags origin
          git fetch origin main
          TAG_COMMIT="$(git rev-list -n 1 "$GITHUB_REF")"
          git merge-base --is-ancestor "$TAG_COMMIT" "origin/main"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump all workspace package versions
        shell: bash
        run: |
          pnpm -r exec npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Build packages
        run: pnpm build

      - name: Publish packages
        shell: bash
        run: |
          pnpm -r publish \
            --access public \
            --no-git-checks \
            --provenance \
            --tag "${{ steps.version.outputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
