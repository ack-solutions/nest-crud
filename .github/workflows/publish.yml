name: Publish Packages (tag)

on:
  push:
    tags:
      - "*.*.*"
      - "*.*.*-beta*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout tag (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "$VERSION" == *"-"* ]]; then
            echo "dist_tag=beta" >> $GITHUB_OUTPUT
          else
            echo "dist_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Ensure tag is from main HEAD
        shell: bash
        run: |
          # Ensure the tag points to a commit that exists on origin/main.
          git fetch --tags origin
          git fetch origin main
          TAG_COMMIT="$(git rev-list -n 1 "$GITHUB_REF")"
          git merge-base --is-ancestor "$TAG_COMMIT" "origin/main"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump all workspace package versions
        shell: bash
        run: |
          pnpm -r exec npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Build packages
        run: pnpm build

      - name: Run tests (gate release)
        run: pnpm -r test

      - name: Run e2e tests (gate release)
        run: pnpm -C apps/example-app test:e2e

      - name: Publish packages
        shell: bash
        run: |
          pnpm -r publish \
            --access public \
            --no-git-checks \
            --provenance \
            --tag "${{ steps.version.outputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Publishes the Dart/Flutter query builder to pub.dev on the SAME tag, at the
  # same version. One-time setup on pub.dev: claim the `nest_crud_request` package
  # and enable "Automated publishing" from this GitHub repo with tag pattern
  # `{{version}}` (matching the repo's bare `1.2.3` tags). The first publish must be
  # done manually (`dart pub publish` locally); automated publishing takes over after.
  publish-dart:
    name: Publish Dart package (pub.dev)
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for pub.dev OIDC automated publishing
    defaults:
      run:
        working-directory: clients/flutter/nest_crud_request
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Set pubspec version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#v}"
          sed -i.bak "s/^version: .*/version: ${VERSION}/" pubspec.yaml && rm -f pubspec.yaml.bak

      - name: Install + test (gate release)
        run: |
          dart pub get
          dart test

      - name: Publish to pub.dev
        run: dart pub publish --force
